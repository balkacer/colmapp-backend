services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: colmapp-rabbitmq
    ports:
      - "5672:5672"   # puerto para microservicios
      - "15672:15672" # dashboard web en http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - colmapp-net

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: colmapp-api-gateway
    ports:
      - "3000:3000"
    env_file:
      - ./apps/api-gateway/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - colmapp-net

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: colmapp-auth-service
    ports:
      - "3001:3001"
    env_file:
      - ./apps/auth-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - colmapp-net
  
  products-service:
    build:
      context: .
      dockerfile: apps/products-service/Dockerfile
    container_name: colmapp-products-service
    ports:
      - "3002:3002"
    env_file:
      - ./apps/products-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - colmapp-net
  
  files-service:
    build:
      context: .
      dockerfile: apps/files-service/Dockerfile
    container_name: colmapp-files-service
    ports:
      - "3003:3003"
    env_file:
      - ./apps/files-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - colmapp-net
  
  providers-service:
    build:
      context: .
      dockerfile: apps/providers-service/Dockerfile
    container_name: colmapp-providers-service
    ports:
      - "3004:3004"
    env_file:
      - ./apps/providers-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - colmapp-net
  
  orders-service:
    build:
      context: .
      dockerfile: apps/orders-service/Dockerfile
    container_name: colmapp-orders-service
    ports:
      - "3005:3005"
    env_file:
      - ./apps/orders-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - colmapp-net
  
  customers-service:
    build:
      context: .
      dockerfile: apps/customers-service/Dockerfile
    container_name: colmapp-customers-service
    ports:
      - "3006:3006"
    env_file:
      - ./apps/customers-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - colmapp-net

networks:
  colmapp-net:
    driver: bridge