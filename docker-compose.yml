services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: colmapp-rabbitmq
    ports:
      - "5672:5672"   # puerto para microservicios
      - "15672:15672" # dashboard web en http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - colmapp-net

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: colmapp-api-gateway
    ports:
      - "3000:3000"
    env_file:
      - ./apps/api-gateway/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - colmapp-net

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: colmapp-auth-service
    ports:
      - "3001:3001"
    env_file:
      - ./apps/auth-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - colmapp-net

networks:
  colmapp-net:
    driver: bridge